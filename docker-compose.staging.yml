x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.staging
  DATABASE_URL: postgres://${POSTGRES_USER:-buddy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-buddy_db}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  # Own logical DB, same reasoning as CELERY_BROKER_URL vs CACHES — keeps
  # channel-layer group/pubsub keys out of the cache's keyspace.
  CHANNEL_REDIS_URL: redis://redis:6379/2
  # ${...} here is Compose's own interpolation (sourced from --env-file),
  # not .env-file expansion — this is the one place PUBLIC_APP_ORIGIN
  # actually needs to fan out to.
  CORS_ALLOWED_ORIGINS: ${PUBLIC_APP_ORIGIN:-http://localhost}
  FRONTEND_URL: ${PUBLIC_APP_ORIGIN:-http://localhost}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buddy_db}
      POSTGRES_USER: ${POSTGRES_USER:-buddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.staging}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buddy} -d ${POSTGRES_DB:-buddy_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env.staging
    environment:
      <<: *django-env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8000/health/live/').status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  websocket:
    build: .
    restart: unless-stopped
    command: ["daphne", "-b", "0.0.0.0", "-p", "8001", "config.asgi:application"]
    env_file: .env.staging
    environment:
      <<: *django-env
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      # ProtocolTypeRouter routes "http" to the same Django app as gunicorn,
      # so the liveness view is reachable over this port too.
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8001/health/live/').status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery_worker:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    env_file: .env.staging
    environment:
      <<: *django-env
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    restart: unless-stopped
    command:
      [
        "celery", "-A", "config", "beat", "-l", "info",
        "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler",
      ]
    env_file: .env.staging
    environment:
      <<: *django-env
    depends_on:
      web:
        condition: service_healthy

  frontend:
    build:
      # Sibling checkout — see README "Docker (staging)" for the expected
      # ../buddy_frontend layout on the VPS.
      context: ../buddy_frontend
      args:
        # NEXT_PUBLIC_* are inlined into the client bundle at build time —
        # must be the URL the *browser* will use (through nginx), never an
        # internal service name like http://web:8000.
        NEXT_PUBLIC_API_URL: ${PUBLIC_APP_ORIGIN:?set PUBLIC_APP_ORIGIN in .env.staging}/api/v1
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
      websocket:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
  static_volume:
  media_volume:
