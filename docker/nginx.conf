worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # Matches MAX_VIDEO_UPLOAD_SIZE_MB (default 50MB) with headroom for
    # multipart overhead — see config/settings/base.py.
    client_max_body_size 55m;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Standard websocket-proxy idiom: only send "Connection: upgrade" when
    # the client actually asked for one, so a bare/non-upgrade request to
    # /ws/ doesn't get an invalid Connection header.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    upstream web_app {
        server web:8000;
    }

    upstream websocket_app {
        server websocket:8001;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;

        location /static/ {
            alias /app/staticfiles/;
        }

        location /media/ {
            alias /app/media/;
        }

        location /health/ {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
            access_log off;
        }

        location /ws/ {
            proxy_pass http://websocket_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Long-lived connections — the default 60s read timeout would
            # kill an idle socket that has no reason to disconnect.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://web_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
